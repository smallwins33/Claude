<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>米米的頁面</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #fef6e4;
    }
    .card {
      text-align: center;
      padding: 2rem 3rem;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 { color: #f07167; }
    p  { color: #555; }
  </style>
</head>
<body>
  <div class="card">
    <h1>你好，米米！</h1>
    <p>歡迎來到米米的小天地。</p>
  </div>
</body>
</html>
