  .type-label { writing-mode: vertical-rl; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; padding: 14px 9px; min-width: 34px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .type-ig { background: #fde8f0; color: #e1306c; }
  .content-text { padding: 14px 14px 12px; font-size: 15px; line-height: 1.75; color: #333; flex: 1; }
  .content-meta { font-size: 12px; color: #bbb; margin-top: 6px; }

  .editable-text { outline: none; border-radius: 6px; padding: 3px 5px; margin: -3px -5px; transition: background 0.15s; display: block; word-break: break-all; white-space: pre-wrap; -webkit-user-modify: read-write; }

// ─── RENDER ───────────────────────────────────────────────
function getDow(month, date) {
  const m = month === 'april' ? 3 : 4;
  return DAYS[new Date(2026, m, date).getDay()];
}

function isToday(month, date) {
  const now = new Date();
  const m = month === 'april' ? 3 : 4;
  return now.getFullYear() === 2026 && now.getMonth() === m && now.getDate() === date;
}

function renderDays(account, filter) {
  const container = document.getElementById('days-' + account);
  container.innerHTML = '';
  const monthData = data[account][currentMonth];
  const groups = weekGroups[currentMonth];

  groups.forEach(group => {
    let hasVisible = false;
    const groupEls = [];

    group.dates.forEach(d => {
      const day = monthData[d];
      if (!day) return;
      if (filter === 'ig' && !day.ig) return;
      hasVisible = true;

      const card = document.createElement('div');
      card.className = 'day-card' + (isToday(currentMonth, d) ? ' today' : '');

      const badges = `<span class="badge badge-threads">T</span>${day.ig ? '<span class="badge badge-ig">IG</span>' : ''}`;
      const preview = day.threads.text.replace(/「|」/g, '');
      const acc = account;
      const mo = currentMonth;

      card.innerHTML = `
        <div class="day-header" onclick="this.closest('.day-card').classList.toggle('open')">
          <div class="day-num">${d}</div>
          <div class="day-info">
            <div class="day-weekday">週${getDow(currentMonth, d)}${isToday(currentMonth, d) ? ' · 今天' : ''}</div>
            <div class="day-preview">${preview}</div>
          </div>
          <div class="day-badges">${badges}</div>
          <div class="chevron">▼</div>
        </div>
        <div class="day-body">
          <div class="content-row">
            <div class="type-label type-threads">THREADS</div>
            <div class="content-text">
              <div class="editable-text" contenteditable="true"
                data-acc="${acc}" data-month="${mo}" data-date="${d}" data-field="threads"
                onblur="saveEdit(this)">${day.threads.text}</div>
              <div class="content-meta">${day.threads.type}</div>
            </div>
          </div>
          ${day.ig ? `<div class="content-row">
            <div class="type-label type-ig">IG</div>
            <div class="content-text">
              <div class="editable-text" contenteditable="true"
                data-acc="${acc}" data-month="${mo}" data-date="${d}" data-field="ig"
                onblur="saveEdit(this)">${day.ig.text}</div>
              <div class="content-meta">${day.ig.format}</div>
            </div>
          </div>` : ''}
        </div>`;

      groupEls.push(card);
    });

    if (hasVisible) {
      const lbl = document.createElement('div');
      lbl.className = 'week-label';
      lbl.textContent = group.label;
      container.appendChild(lbl);
      groupEls.forEach(el => container.appendChild(el));
    }
  });
}

function switchMonth(month) {
  currentMonth = month;
  document.querySelectorAll('.month-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && month === 'april') || (i === 1 && month === 'may'));
  });
  renderDays('sw', currentFilter.sw);
  renderDays('mi', currentFilter.mi);
  setTimeout(() => {
    const today = document.querySelector('.day-card.today .day-header');
    if (today) today.closest('.day-card').classList.add('open');
  }, 50);
}

function switchAccount(acc) {
  currentAccount = acc;
  document.querySelectorAll('.acc-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && acc === 'sw') || (i === 1 && acc === 'mi'));
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + acc).classList.add('active');
}

function filterDays(btn, account, filter) {
  currentFilter[account] = filter;
  btn.closest('.filter-bar').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDays(account, filter);
}

// ─── EDIT & SAVE ──────────────────────────────────────────
function saveEdit(el) {
  const acc = el.dataset.acc;
  const month = el.dataset.month;
  const date = parseInt(el.dataset.date);
  const field = el.dataset.field;
  const newText = el.innerText.trim();

  if (field === 'threads') {
    data[acc][month][date].threads.text = newText;
  } else {
    data[acc][month][date].ig.text = newText;
  }

  if (field === 'threads') {
    const card = el.closest('.day-card');
    const preview = card.querySelector('.day-preview');
    if (preview) preview.textContent = newText.replace(/「|」/g, '');
  }

  localStorage.setItem('social_calendar_edits', JSON.stringify(data));
  showToast();
}

function showToast() {
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
}

function loadSavedEdits() {
  const saved = localStorage.getItem('social_calendar_edits');
  if (!saved) return;
  try {
    const saved_data = JSON.parse(saved);
    ['sw','mi'].forEach(acc => {
      ['april','may'].forEach(month => {
        if (!saved_data[acc] || !saved_data[acc][month]) return;
        Object.keys(saved_data[acc][month]).forEach(d => {
          const sd = saved_data[acc][month][d];
          if (!data[acc][month][d]) return;
          if (sd.threads) data[acc][month][d].threads.text = sd.threads.text;
          if (sd.ig && data[acc][month][d].ig) data[acc][month][d].ig.text = sd.ig.text;
        });
      });
    });
  } catch(e) {}
}

function exportHTML() {
  const src = document.documentElement.outerHTML;
  const dataStr = JSON.stringify(data, null, 2);
  const updated = src.replace(
    /const data = \{[\s\S]*?\};\n\n\/\/ ─── RENDER/,
    `const data = ${dataStr};\n\n// ─── RENDER`
  );
  const blob = new Blob([updated], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'social_calendar_mobile_updated.html';
  a.click();
  showToast();
}

// Init
loadSavedEdits();
renderDays('sw', 'all');
renderDays('mi', 'all');
setTimeout(() => {
  const today = document.querySelector('.day-card.today .day-header');
  if (today) today.closest('.day-card').classList.add('open');
}, 50);
